name: Build & Deploy (Feuerware)

on:
  push:
    branches: ['**']
  delete:
  workflow_dispatch:
    inputs:
      target:
        description: 'Production → Feuerware /production/. Branch preview → Feuerware /branch/ only.'
        type: choice
        required: true
        default: production
        options:
          - production
          - branch-preview

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# FTP folder names used by the live PHP highscore API — never mirror game dist/ here.
# Do not create git branches with these names (branch previews deploy to /<branch>/).
# Job-level `if` cannot use workflow env; keep this list in sync with RESERVED_FTP_FOLDERS below.
jobs:
  build:
    name: Build site
    if: |
      github.event_name != 'delete' &&
      (
        github.event_name == 'workflow_dispatch' ||
        !contains(fromJSON('["backend"]'), github.ref_name)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 1

  deploy-feuerware:
    name: Deploy to Feuerware (FTP)
    needs: build
    if: |
      github.event_name != 'delete' &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.target == 'production') ||
        !contains(fromJSON('["backend"]'), github.ref_name)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      # the chat admin key lives only in the repo secret — injected into the
      # PHP just before upload, never in git or the build artifact
      - name: Inject chat admin key
        env:
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "ADMIN_KEY secret not set — sticky admin stays disabled"
          else
            python3 - <<'PY'
          import os
          path = 'dist/backend/chat.php'
          key = os.environ['ADMIN_KEY'].replace('\\', '\\\\').replace("'", "\\'")
          src = open(path).read().replace('__ADMIN_KEY__', key)
          open(path, 'w').write(src)
          print('admin key injected')
          PY
          fi

      - name: Set target folder
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.target }}" = "production" ]; then
            folder=production
          else
            folder="${{ github.ref_name }}"
          fi
          echo "folder=$folder" >> $GITHUB_OUTPUT
          echo "Deploying to Feuerware folder: /$folder/"

      - name: Deploy to FTP
        run: |
          sudo apt-get update && sudo apt-get install -y lftp

          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<EOF
          set ftp:ssl-allow no
          set ftp:passive-mode true
          set net:timeout 30
          set net:max-retries 3
          mkdir -p "/${{ steps.target.outputs.folder }}"

          mirror -R "./dist/" "/${{ steps.target.outputs.folder }}" \
            --delete \
            --parallel=10 \
            --exclude-glob .htaccess \
            --exclude-glob .htpasswd \
            --exclude-glob "stats/" \
            --exclude-glob "backend/stats/" \
            --exclude-glob "players/" \
            --exclude-glob "backend/players/" \
            --verbose
          quit
          EOF

  cleanup-feuerware:
    name: Remove Feuerware preview folder
    if: |
      github.event_name == 'delete' &&
      github.event.ref_type == 'branch' &&
      github.event.ref != 'main' &&
      github.event.ref != 'master' &&
      !contains(fromJSON('["backend"]'), github.event.ref)
    runs-on: ubuntu-latest
    steps:
      - name: Remove branch folder from FTP
        run: |
          sudo apt-get update && sudo apt-get install -y lftp

          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<EOF
          set ftp:ssl-allow no
          set ftp:passive-mode true
          rm -rf "/${{ github.event.ref }}"
          quit
          EOF
