<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MELODAN — suggestions</title>
  <style>
    :root {
      --bg: #121810;
      --panel: #1a2418;
      --ink: #e8e0d0;
      --muted: #9a9080;
      --accent: #ffd040;
      --line: #3a4430;
      --bad: #b86a5a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.45 "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding: 24px;
    }
    h1 { font-size: 1.35rem; font-weight: 700; margin: 0 0 4px; letter-spacing: 0.04em; }
    .sub { color: var(--muted); margin: 0 0 20px; }
    .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: end; margin-bottom: 16px; }
    label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
    input, button {
      font: inherit;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
    }
    button {
      cursor: pointer;
      background: var(--accent);
      color: #1a180a;
      border-color: var(--accent);
      font-weight: 700;
    }
    button.danger {
      background: transparent;
      color: var(--bad);
      border-color: var(--bad);
    }
    button:disabled { opacity: 0.5; cursor: wait; }
    .status { color: var(--muted); min-height: 1.2em; margin-bottom: 14px; }
    .list { display: flex; flex-direction: column; gap: 12px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .cat {
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .msg {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0 0 10px;
    }
    .specs {
      margin: 0;
      padding: 10px;
      background: rgba(0,0,0,0.25);
      border-radius: 6px;
      font: 12px/1.4 ui-monospace, monospace;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .actions { margin-top: 12px; display: flex; gap: 8px; }
    .empty { color: var(--muted); padding: 24px 0; }
  </style>
</head>
<body>
  <h1>Suggestions</h1>
  <p class="sub">Inbox for player ideas. Same admin key as chat sticky. Data lives in <code>suggestions/data.json</code>.</p>

  <div class="row">
    <label>API
      <input id="api" size="48" value="" />
    </label>
    <label>Admin key
      <input id="key" type="password" size="28" autocomplete="off" />
    </label>
    <button type="button" id="load">Load</button>
  </div>
  <div class="status" id="status">Enter key and load.</div>
  <div class="list" id="list"></div>

  <script>
    const apiEl = document.getElementById('api');
    const keyEl = document.getElementById('key');
    const statusEl = document.getElementById('status');
    const listEl = document.getElementById('list');

    apiEl.value = new URL('suggest.php', location.href).href;
    keyEl.value = sessionStorage.getItem('melodan-suggest-key') || '';

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function fmtTime(ts) {
      try {
        return new Date(ts * 1000).toLocaleString();
      } catch {
        return String(ts);
      }
    }

    async function load() {
      const key = keyEl.value.trim();
      if (!key) {
        statusEl.textContent = 'Admin key required.';
        return;
      }
      sessionStorage.setItem('melodan-suggest-key', key);
      statusEl.textContent = 'Loading…';
      listEl.innerHTML = '';
      try {
        const url = new URL(apiEl.value);
        url.searchParams.set('action', 'list');
        url.searchParams.set('key', key);
        const res = await fetch(url);
        const data = await res.json();
        if (!res.ok) {
          statusEl.textContent = data.error || ('HTTP ' + res.status);
          return;
        }
        const items = data.items || [];
        statusEl.textContent =
          items.length + ' suggestion(s)' +
          (data.lastNotifyDay ? ' · last notify day ' + data.lastNotifyDay + ' UTC' : '');
        if (!items.length) {
          listEl.innerHTML = '<p class="empty">No suggestions yet.</p>';
          return;
        }
        listEl.innerHTML = items.map((it) => {
          const specs = it.specs
            ? `<pre class="specs">${esc(it.specs)}</pre>`
            : '';
          return (
            `<article class="card" data-id="${esc(it.id)}">` +
            `<div class="meta">` +
            `<span class="cat">${esc(it.category || '?')}</span>` +
            `<span>${esc(fmtTime(it.ts))}</span>` +
            `<span>${esc(it.source || '')}</span>` +
            `<span>${esc(it.ip || '')}</span>` +
            `</div>` +
            `<p class="msg">${esc(it.message || '')}</p>` +
            specs +
            `<div class="actions"><button type="button" class="danger" data-del="${esc(it.id)}">Delete</button></div>` +
            `</article>`
          );
        }).join('');
      } catch (e) {
        statusEl.textContent = 'Failed: ' + (e && e.message ? e.message : e);
      }
    }

    async function del(id) {
      if (!confirm('Delete this suggestion?')) return;
      const key = keyEl.value.trim();
      statusEl.textContent = 'Deleting…';
      try {
        const res = await fetch(apiEl.value + '?action=delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key, id }),
        });
        const data = await res.json();
        if (!res.ok) {
          statusEl.textContent = data.error || ('HTTP ' + res.status);
          return;
        }
        await load();
      } catch (e) {
        statusEl.textContent = 'Delete failed: ' + (e && e.message ? e.message : e);
      }
    }

    document.getElementById('load').addEventListener('click', () => void load());
    listEl.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-del]');
      if (btn) void del(btn.getAttribute('data-del'));
    });
    keyEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') void load();
    });
  </script>
</body>
</html>
